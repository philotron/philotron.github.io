baseURL: "https://philotron.github.io/" 
title: Phillip Schneider
theme: PaperMod

enableInlineShortcodes: true
enableRobotsTXT: true
pagination:
  pagerSize: 20

taxonomies:
    tag: tags

menu:
    main:
        - name: Books
          url: books/
          weight: 5 
        - name: Papers
          url: papers/
          weight: 2
        - name: Courses
          url: courses/
          weight: 3
        - name: Data
          url: data/
          weight: 4 
        - name: Blog
          url: https://en.wikipedia.org/wiki/Moritz-Maria_von_Igelfeld_(character)
          weight: 6

params:
    description: "This website hosts Phillip Schneider's personal website."
    author: Phillip Schneider
    # googleAnalyticsID: "G-XXXXX"
    DateFormat: "January 2006"
    defaultTheme: light
    hideFooter: false
    disableThemeToggle: true
    ShowShareButtons: false
    ShowReadingTime: false
    disableSpecial1stPost: true
    disableAnchoredHeadings: true
    ShowPostNavLinks: false
    ShowBreadCrumbs: false
    ShowCodeCopyButtons: true
    ShowAllPagesInArchive: false
    MainSections: ["books","courses","papers","data"]
    ShowToc: false
    disableScrollToTop: true
    TocOpen: true
    ShowWordCount: false
    UseHugoToc: true
    comments: false
    math: true
    profileMode:
          enabled: true
          title: Phillip Schneider
          subtitle: "Welcome to my page! I'm Phillip Schneider, Head of Natural Language Processing at the startup ALMA PHIL, where we're transforming personal healthcare with AI-powered voice assistants. I hold a PhD in Computer Science from the Technical University of Munich, where I focused on dialogue systems and exploratory information retrieval, and have deepened my AI expertise through international research at AIST Tokyo and industry experience at IBM and Amazon."
          imageUrl: "photo.jpg"
          imageWidth: 160
          imageHeight: 160
          imageTitle: Phillip
          buttons:
            - name: Resume
              url: resume/
            - name: Research
              url: research/
            - name: Projects
              url: projects/

    socialIcons:
        - name: LinkedIn
          url: https://www.linkedin.com/in/01-phillip-schneider/
        - name: Google Scholar
          url: https://scholar.google.com/citations?user=8pJ9OFQAAAAJ&hl
        - name: ORCID
          url: https://orcid.org/0000-0001-9492-2927
        - name: GitHub
          url: https://github.com/philotron

    assets:
        disableScrollBarStyle: true
    cover:
        hiddenInList: false
        hiddenInSingle: true
    label:
      text: "Phillip Schneider"
      icon: favicon.ico
      iconHeight: 18

markup:
    goldmark:
        renderer:
            unsafe: true
    highlight:
        guessSyntax: true
        style: autumn 
    tableOfContents:
        endLevel: 2
        ordered: false
        startLevel: 2