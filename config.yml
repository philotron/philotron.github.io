baseURL: "https://philotron.github.io/" 
title: Phillip Schneider
theme: PaperMod

enableInlineShortcodes: true
enableRobotsTXT: true
pagination:
  pagerSize: 20

taxonomies:
    tag: tags

menu:
    main:
        - name: Resume
          url: resume/
          weight: 2
        - name: Research
          url: research/
          weight: 3
        - name: Projects
          url: projects/
          weight: 4
        - name: Datasets
          url: datasets/
          weight: 5
        - name: Photography
          url: photography/
          weight: 6

params:
    description: "This website hosts Phillip Schneider's personal website."
    author: Phillip Schneider
    # googleAnalyticsID: "G-XXXXX"
    DateFormat: "January 2006"
    defaultTheme: light
    hideFooter: false
    disableThemeToggle: true
    ShowShareButtons: false
    ShowReadingTime: false
    disableSpecial1stPost: true
    disableAnchoredHeadings: true
    ShowPostNavLinks: false
    ShowBreadCrumbs: false
    ShowCodeCopyButtons: true
    ShowAllPagesInArchive: false
    MainSections: ["resume","research","projects", "datasets", "photography"]
    ShowToc: false
    disableScrollToTop: true
    TocOpen: true
    ShowWordCount: false
    UseHugoToc: true
    comments: false
    math: true
    profileMode:
          enabled: true
          title: Phillip Schneider
          subtitle: "Welcome to my page! I'm Phillip Schneider, Head of NLP at ALMA PHIL, a startup building AI-powered voice assistants to transform personal healthcare. I hold a PhD in Computer Science from the Technical University of Munich, where I specialized in dialogue systems, knowledge graphs, and exploratory information retrieval. My work bridges academia and industry, including research at AIST in Tokyo and roles at IBM in Belgium and Amazon in Luxembourg/London."
          imageUrl: "profile.jpg"
          imageWidth: 160
          imageHeight: 160
          imageTitle: Phillip
          buttons:
            - name: Resume
              url: resume/
            - name: Research
              url: research/
            - name: Projects
              url: projects/
            - name: Datasets
              url: datasets/
            - name: Photography
              url: photography/

    socialIcons:
        - name: LinkedIn
          url: https://www.linkedin.com/in/01-phillip-schneider/
        - name: Google Scholar
          url: https://scholar.google.com/citations?user=8pJ9OFQAAAAJ&hl
        - name: ORCID
          url: https://orcid.org/0000-0001-9492-2927
        - name: GitHub
          url: https://github.com/philotron

    assets:
        disableScrollBarStyle: true
    cover:
        hiddenInList: false
        hiddenInSingle: true
    label:
      text: "Phillip Schneider"
      icon: favicon.ico
      iconHeight: 18

markup:
    goldmark:
        renderer:
            unsafe: true
    highlight:
        guessSyntax: true
        style: autumn 
    tableOfContents:
        endLevel: 2
        ordered: false
        startLevel: 2